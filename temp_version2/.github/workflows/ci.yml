name: CI / CD

# ─────────────────────────────────────────────────────────────────────────────
# Runs only after push to main.
# PR builds/typechecks are handled by pr-validation.yml.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]

jobs:
  # ─── Type Check + Build ───────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  # ─── Docker Build & Push ─────────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/merge:latest
            ghcr.io/${{ github.repository_owner }}/merge:${{ github.sha }}

  # ─── Deploy to Server ────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Skip if no server configured
        if: env.DEPLOY_HOST == ''
        run: |
          echo "⏭️ No DEPLOY_HOST secret — skipping deploy."
          echo "To enable: add DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY in repo Settings → Secrets."

      - name: Deploy via SSH
        if: env.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/neighborly
            docker compose pull web-app
            docker compose up -d --no-build
            docker compose exec -T web-app npx prisma migrate deploy
            docker image prune -f
