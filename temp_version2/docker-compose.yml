services:

  # ─── Reverse Proxy ────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: neighborly_traefik
    user: root
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=neighborly_network"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"       # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - neighborly_network
    restart: unless-stopped

  # ─── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: neighborly_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-EagleRock901}
      POSTGRES_DB: ${DB_NAME:-neighborly_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neighborly_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-neighborly_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: neighborly_cache
    networks:
      - neighborly_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Message Bus ──────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: neighborly_bus
    networks:
      - neighborly_network
    restart: unless-stopped

  # ─── Main Web App (React Admin + Express API) ─────────────────────────────
  web-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: neighborly_web_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-EagleRock901}@postgres:5432/${DB_NAME:-neighborly_db}?schema=public
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - neighborly_network
    restart: unless-stopped
    ports:
      - "3000:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-app.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web-app.entrypoints=web"
      - "traefik.http.routers.web-app.priority=1"
      - "traefik.http.services.web-app.loadbalancer.server.port=8080"

  # ─── Container Management ────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: neighborly_portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - neighborly_network
    restart: unless-stopped
    ports:
      - "9000:9000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=PathPrefix(`/portainer`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.middlewares.portainer-strip.stripprefix.prefixes=/portainer"
      - "traefik.http.routers.portainer.middlewares=portainer-strip"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ─── Analytics ────────────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: neighborly_metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_USER: ${DB_USER:-postgres}
      MB_DB_PASS: ${DB_PASSWORD:-EagleRock901}
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - neighborly_network
    restart: unless-stopped
    ports:
      - "3001:3000"           # Metabase direct access
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metabase.rule=PathPrefix(`/metabase`)"
      - "traefik.http.routers.metabase.entrypoints=web"
      - "traefik.http.middlewares.metabase-strip.stripprefix.prefixes=/metabase"
      - "traefik.http.routers.metabase.middlewares=metabase-strip"
      - "traefik.http.services.metabase.loadbalancer.server.port=3000"

networks:
  neighborly_network:
    driver: bridge
    name: neighborly_network

volumes:
  postgres_data: {}
  portainer_data: {}
