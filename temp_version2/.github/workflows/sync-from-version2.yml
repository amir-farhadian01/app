name: Sync from Version2

# ─────────────────────────────────────────────────────────────────────────────
# Daily ~08:00 Iran (04:30 UTC) or manual dispatch.
#
# Strategy:
#   - Frontend paths (`src/`, `flutter_project/`) are synced from Version2
#   - Backend / infrastructure (`routes/`, `lib/`, `prisma/`, Docker files) stay Merge-owned
#   - Firebase imports are redirected to local shims via Vite aliases (no manual rewrite)
#
# Secret:
#   SYNC_PAT — GitHub PAT with repo + workflow scopes
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force PR even if already synced'
        required: false
        default: 'false'

jobs:
  sync:
    name: Sync frontend from Version2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Merge repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Version2 as upstream remote
        run: |
          git remote add upstream https://github.com/amir-farhadian01/Version2.git || true
          git fetch upstream --no-tags

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count 2>/dev/null || echo 0)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

          if [[ "$BEHIND" -eq 0 && "${{ github.event.inputs.force }}" != "true" ]]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if up to date
        if: steps.check.outputs.up_to_date == 'true'
        run: echo "✓ Already up to date with Version2."

      - name: Collect what changed
        if: steps.check.outputs.up_to_date == 'false'
        id: meta
        run: |
          COMMITS=$(git log HEAD..upstream/main --oneline --no-decorate)
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS"     >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT

          CHANGED=$(git diff HEAD..upstream/main --name-only)
          FLUTTER_CHANGED=false
          echo "$CHANGED" | grep -q "^flutter_project/" && FLUTTER_CHANGED=true || true
          echo "flutter_changed=$FLUTTER_CHANGED" >> $GITHUB_OUTPUT

          STAT=$(git diff HEAD..upstream/main --stat | tail -3)
          echo "stat<<EOF" >> $GITHUB_OUTPUT
          echo "$STAT"     >> $GITHUB_OUTPUT
          echo "EOF"       >> $GITHUB_OUTPUT

      - name: Create sync branch
        if: steps.check.outputs.up_to_date == 'false'
        id: branch
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          BRANCH="sync/version2-$DATE"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH"

      # ── Copy ONLY frontend files from Version2 ───────────────────────────────
      # Backend files (routes/, lib/, prisma/, Dockerfile, etc.) are NEVER touched.
      # Firebase calls in the frontend are handled by Vite aliases → our shims.

      - name: Copy src/ from Version2
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git checkout upstream/main -- src/ || true

          # Always restore our shim files (Version2 might overwrite firebase.ts)
          git checkout HEAD -- src/lib/shims/ || true
          git checkout HEAD -- src/lib/firebase.ts || true
          git checkout HEAD -- src/lib/api.ts || true
          git checkout HEAD -- src/lib/AuthContext.tsx || true

      - name: Copy flutter_project/ from Version2
        if: >
          steps.check.outputs.up_to_date == 'false' &&
          steps.meta.outputs.flutter_changed == 'true'
        run: |
          git checkout upstream/main -- flutter_project/ || true

      - name: Copy index.html and top-level assets from Version2
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          # Only visual/non-infra files
          for f in index.html; do
            git checkout upstream/main -- "$f" 2>/dev/null || true
          done

      - name: Commit synced files
        if: steps.check.outputs.up_to_date == 'false'
        id: commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: sync frontend from Version2 ($(date +%Y-%m-%d))"
            echo "no_changes=false" >> $GITHUB_OUTPUT
            git push origin "${{ steps.branch.outputs.branch }}"
          fi

      - name: Open Pull Request
        if: >
          steps.check.outputs.up_to_date == 'false' &&
          steps.commit.outputs.no_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh pr create \
            --title "chore: sync frontend from Version2 ($(date +%Y-%m-%d))" \
            --body "$(cat <<'BODY'
          ## Sync from Version2

          **Commits (${{ steps.check.outputs.behind }} new):**
          \`\`\`
          ${{ steps.meta.outputs.commits }}
          \`\`\`

          **Changed files:**
          \`\`\`
          ${{ steps.meta.outputs.stat }}
          \`\`\`

          ## What changed
          - Only `src/` and `flutter_project/` were updated from Version2
          - `routes/`, `lib/`, `prisma/`, `Dockerfile`, `docker-compose.yml` were left untouched
          - Firebase imports in the frontend are redirected to local shims via Vite aliases

          ## Checklist
          - [ ] Review the PR
          - [ ] Confirm CI is green
          - [ ] Merge when ready

          ---
          Auto-generated by sync-from-version2 workflow
          BODY
          )" \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --label "sync" || true
