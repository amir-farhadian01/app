server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Exact /flutter → /flutter/ so index.html and <base href> resolve consistently
    location = /flutter {
        return 302 /flutter/;
    }

    # Flutter is published under /flutter/
    location /flutter/ {
        try_files $uri $uri/ /flutter/index.html;
    }

    # Avoid stale index.html after rebuild (browser may cache old main.dart.js path)
    location = /flutter/index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
