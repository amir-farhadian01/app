name: PR Validation

# ─────────────────────────────────────────────────────────────────────────────
# Runs whenever a PR is opened or updated.
#
# Responsibilities:
#   1. Build and type-check
#   2. Detect Prisma schema changes → post an automated comment
#   3. Detect new env vars → warning comment
#   4. Flag routes that may be missing auth middleware
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # ── 1. Build & Type Check ──────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check (backend)
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  # ── 2. Smart Code Analysis ─────────────────────────────────────────────────
  analyze:
    name: Analyze Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect sensitive changes
        id: detect
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff "$BASE".."$HEAD" --name-only)

          PRISMA_CHANGED=false
          ENV_CHANGED=false

          echo "$CHANGED" | grep -q "prisma/schema.prisma" && PRISMA_CHANGED=true || true
          echo "$CHANGED" | grep -q ".env.example"          && ENV_CHANGED=true    || true

          echo "prisma_changed=$PRISMA_CHANGED" >> $GITHUB_OUTPUT
          echo "env_changed=$ENV_CHANGED"       >> $GITHUB_OUTPUT

          # Show new env vars if .env.example changed
          if $ENV_CHANGED; then
            NEW_VARS=$(git diff "$BASE".."$HEAD" -- .env.example | grep '^+' | grep -v '^+++' | grep -v '^+#' | sed 's/^+//')
            echo "new_vars<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_VARS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

          # Show Prisma diff
          if $PRISMA_CHANGED; then
            PRISMA_DIFF=$(git diff "$BASE".."$HEAD" -- prisma/schema.prisma | head -60)
            echo "prisma_diff<<EOF" >> $GITHUB_OUTPUT
            echo "$PRISMA_DIFF" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check for routes missing auth
        id: auth_check
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Find new route definitions without requireAuth
          SUSPICIOUS=$(git diff "$BASE".."$HEAD" -- 'routes/*.ts' \
            | grep '^+' \
            | grep -E "router\.(get|post|put|patch|delete)" \
            | grep -v "requireAuth" \
            | grep -v "^+++" \
            | grep -v "system\|health\|login\|register\|refresh" \
            | sed 's/^+//' \
            | head -10)

          echo "suspicious<<EOF" >> $GITHUB_OUTPUT
          echo "$SUSPICIOUS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const prismaChanged = '${{ steps.detect.outputs.prisma_changed }}' === 'true';
            const envChanged    = '${{ steps.detect.outputs.env_changed }}'    === 'true';
            const newVars       = `${{ steps.detect.outputs.new_vars }}`;
            const prismaDiff    = `${{ steps.detect.outputs.prisma_diff }}`;
            const suspicious    = `${{ steps.auth_check.outputs.suspicious }}`;

            // Post only when there is something actionable
            if (!prismaChanged && !envChanged && !suspicious.trim()) return;

            let body = '## Automated PR review\n\n';

            if (prismaChanged) {
              body += '### Prisma schema changed\n';
              body += 'After merge, run locally (maintainer-owned migrations):\n';
              body += '```bash\nnpx prisma migrate dev --name describe_change\nnpx prisma generate\n```\n\n';
              if (prismaDiff) {
                body += '<details><summary>Schema diff (truncated)</summary>\n\n```diff\n' + prismaDiff + '\n```\n</details>\n\n';
              }
            }

            if (envChanged && newVars.trim()) {
              body += '### New environment variables\n';
              body += 'Add these to your local `.env` as needed:\n';
              body += '```\n' + newVars + '\n```\n\n';
            }

            if (suspicious.trim()) {
              body += '### Routes without auth — please verify\n';
              body += 'These additions may need `requireAuth` (or an explicit public exception):\n';
              body += '```typescript\n' + suspicious + '\n```\n\n';
              body += '(Ignore if they are intentionally public.)\n\n';
            }

            body += '---\nAuto-generated by pr-validation workflow';

            // Replace previous bot comment if present
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const prev = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Automated PR review')
            );

            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prev.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
